name: Rebuild Project Dashboards
on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'If true, commit generated files when running manually'
        required: false
        default: 'false'
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run regen-projects
        run: make -C dev_hub regen-projects
      - name: Validate (dry-run)
        run: |
          echo "Dry-run: git status"
          git status --porcelain || true
          echo
          echo "Files changed:" 
          git --no-pager diff --name-only || true
      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  commit:
    needs: regen
    runs-on: ubuntu-latest
    environment: regen-approve
    if: needs.regen.outputs.has_changes == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.commit == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Commit and push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name "${GIT_AUTHOR_NAME}"
          git config user.email "${GIT_AUTHOR_EMAIL}"
          git add dev_hub/dist/projects_data.js dev_hub/dist/projects || true
          git add dev_hub/projects.json dev_hub/Makefile || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "CI: rebuild project dashboards [skip ci]" || echo "commit failed"
            git push
          else
            echo "No changes to commit"
          fi
